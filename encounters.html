<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Encounters | Clinical Inquiry Lab</title>
    <style>
        :root { 
            --ui-blue: #00558C; 
            --ui-gold: #FFCD00; 
            --bg: #f8fafc; 
            --text: #1e293b; 
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            line-height: 1.6; 
        }

        header { 
            background-color: #ffffff; 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 8px solid var(--ui-gold); 
        }

        .header-logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 15px;
        }

        header h1 { margin: 0; font-size: 2rem; color: var(--ui-blue); }
        
        .nav-back {
            display: inline-block;
            margin-top: 15px;
            color: var(--ui-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .page-intro { text-align: center; margin-bottom: 40px; }
        .page-intro p { color: #64748b; max-width: 600px; margin: 10px auto; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 30px; 
        }

        .patient-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .patient-thumb {
            width: 100%;
            height: 180px;
            background-color: #e2e8f0;
            object-fit: cover;
            border-bottom: 4px solid var(--ui-gold);
        }

        .card-content { padding: 20px; flex-grow: 1; }

        .patient-name { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: var(--ui-blue); 
            margin-bottom: 8px; 
        }

        .patient-desc { 
            font-size: 0.95rem; 
            color: #64748b; 
            margin-bottom: 15px; 
            min-height: 40px;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--ui-blue);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
        }

        .audio-container {
            margin: 15px 0; 
            background: #f1f5f9; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #cbd5e1;
        }

        audio { width: 100%; height: 35px; }

        .checklist {
            margin: 15px 0;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .checklist label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #000000;
        }

        .clinical-input-area {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: none;
            box-sizing: border-box;
            background-color: #ffffff;
        }

        .submit-btn {
            width: 100%;
            background: var(--ui-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }

        .submit-btn:hover { background: #003d66; }

        .feedback-mark {
            font-weight: bold;
            margin-right: 5px;
            display: inline-block;
            width: 15px;
        }

        details {
            margin-top: 20px; 
            border: 2px solid var(--ui-blue); 
            padding: 15px; 
            border-radius: 8px; 
            background-color: #f0f7ff;
        }

        summary {
            font-weight: 800; 
            cursor: pointer; 
            color: var(--ui-blue);
        }

        .expert-content {
            margin-top: 15px; 
            font-size: 0.95rem; 
            border-top: 1px solid #cbd5e1; 
            padding-top: 10px;
        }

        footer { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 0.9rem; }

    </style>
</head>
<body>

<header>
    <img src="./images/CIL_logo.png" alt="CIL Logo" class="header-logo">
    <h1>Clinical Ear: Patient Encounters</h1>
    <a href="index.html" class="nav-back">← Back to Lab Home</a>
</header>

<div class="container">
    <div class="page-intro">
        <p>Listen to the patient, identify specific clues, and record your initial clinical judgment. Then compare your diagnosis with the expert's!</p>
    </div>

    <div class="grid">
        
        <div class="patient-card">
            <img src="./images/headshot_patient1.jpg" alt="Case Patient 1" class="patient-thumb">
            <div class="card-content">
                <div class="patient-name">Case #01: Sudden Diagnosis</div>
                <p class="patient-desc">Mrs. Ramirez, 35. Admitted with a high WBC count.</p>
                
                <div class="audio-container">
                    <span class="section-label">Listen to Encounter:</span>
                    <audio controls>
